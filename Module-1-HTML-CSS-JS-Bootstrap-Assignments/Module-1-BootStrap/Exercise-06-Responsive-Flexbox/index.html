<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Responsive Flexbox Utilities</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <h1 class="text-center text-primary mb-5">Community Event Portal</h1>

      <!-- Responsive Navbar -->

      <div
        class="d-flex flex-column flex-md-row justify-content-between align-items-center bg-dark text-white p-3 rounded mb-5"
      >
        <h3 class="mb-3 mb-md-0">Event Portal</h3>

        <div>
          <button class="btn btn-primary me-2">Home</button>

          <button class="btn btn-success me-2">Events</button>

          <button class="btn btn-warning">Contact</button>
        </div>
      </div>

      <!-- Responsive Event Cards -->

      <div class="d-flex flex-column flex-md-row justify-content-between gap-3">
        <div class="card flex-fill shadow">
          <div class="card-body">
            <h4>Tech Meetup</h4>

            <p>Learn modern web technologies.</p>
          </div>
        </div>

        <div class="card flex-fill shadow">
          <div class="card-body">
            <h4>Music Festival</h4>

            <p>Enjoy live performances and fun.</p>
          </div>
        </div>

        <div class="card flex-fill shadow">
          <div class="card-body">
            <h4>Food Carnival</h4>

            <p>Explore delicious local foods.</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
