<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Bootstrap Icons</title>

    <!-- Bootstrap CSS -->

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>

  <body class="bg-light">
    <div class="container py-5">
      <h1 class="text-center text-primary mb-5">Bootstrap Icons Demo</h1>

      <!-- Exercise 17.2 -->

      <h3 class="mb-4">Icon Only Buttons</h3>

      <div class="d-flex gap-3 mb-5">
        <button class="btn btn-primary">
          <i class="bi bi-house-fill"></i>
        </button>

        <button class="btn btn-success">
          <i class="bi bi-calendar-event-fill"></i>
        </button>

        <button class="btn btn-warning">
          <i class="bi bi-person-fill"></i>
        </button>

        <button class="btn btn-danger">
          <i class="bi bi-envelope-fill"></i>
        </button>
      </div>

      <!-- Sample Content -->

      <div class="card shadow">
        <div class="card-body text-center">
          <h3>Community Event Portal</h3>

          <p>Bootstrap Icons are being used throughout this page.</p>
        </div>
      </div>
    </div>

    <!-- Exercise 17.1 -->

    <footer class="bg-dark text-white text-center py-4 mt-5">
      <h5>Follow Us</h5>

      <div class="fs-3">
        <i class="bi bi-facebook mx-2"></i>

        <i class="bi bi-instagram mx-2"></i>

        <i class="bi bi-twitter-x mx-2"></i>

        <i class="bi bi-linkedin mx-2"></i>

        <i class="bi bi-youtube mx-2"></i>
      </div>
    </footer>
  </body>
</html>
