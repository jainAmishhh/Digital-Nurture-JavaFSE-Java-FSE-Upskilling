<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Spacing Utilities</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container">
      <!-- Exercise 12.1 -->

      <div class="bg-primary text-white p-2 mt-4">
        <h2>Exercise 12.1</h2>

        <p>This section uses: p-2 and mt-4</p>
      </div>

      <div class="bg-success text-white m-3 py-5">
        <h2>Bootstrap Spacing Utilities</h2>

        <p>This section uses: m-3 and py-5</p>
      </div>

      <!-- Exercise 12.2 -->

      <h2 class="text-center mt-5 mb-4">Pricing Plans</h2>

      <div class="row">
        <div class="col-md-4">
          <div class="card shadow p-3 mb-4">
            <div class="card-body text-center">
              <h3>Basic</h3>

              <h4 class="text-primary">₹499</h4>

              <p>Access to community events</p>

              <button class="btn btn-primary">Choose Plan</button>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card shadow p-3 mb-4">
            <div class="card-body text-center">
              <h3>Standard</h3>

              <h4 class="text-success">₹999</h4>

              <p>Events + Workshops</p>

              <button class="btn btn-success">Choose Plan</button>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card shadow p-3 mb-4">
            <div class="card-body text-center">
              <h3>Premium</h3>

              <h4 class="text-danger">₹1499</h4>

              <p>All events + VIP access</p>

              <button class="btn btn-danger">Choose Plan</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
