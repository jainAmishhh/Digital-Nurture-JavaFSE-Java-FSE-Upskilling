<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Alignment and Reordering</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <h1 class="text-center text-primary mb-5">Community Event Portal</h1>

      <!-- Exercise 5.1 -->

      <h3 class="mb-3">Center Alignment</h3>

      <div
        class="row justify-content-center align-items-center bg-secondary text-white rounded mb-5"
        style="height: 200px"
      >
        <div class="col-md-4">
          <div class="bg-primary p-4 text-center rounded">Centered Content</div>
        </div>
      </div>

      <!-- Exercise 5.2 -->

      <h3 class="mb-3">Reordering Columns</h3>

      <div class="row">
        <!-- Content First on Mobile -->

        <div class="col-md-6 order-md-2">
          <div class="bg-success text-white p-4 rounded">Main Content</div>
        </div>

        <!-- Sidebar Second on Mobile -->

        <div class="col-md-6 order-md-1">
          <div class="bg-warning text-dark p-4 rounded">Sidebar</div>
        </div>
      </div>
    </div>
  </body>
</html>
