<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Column Layouts and Grid Classes</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <h1 class="text-center text-primary mb-4">Community Event Portal</h1>

      <!-- Exercise 4.1 -->

      <h3 class="mb-3">Two Column Layout</h3>

      <div class="row mb-5">
        <div class="col-md-3">
          <div class="bg-dark text-white p-4 rounded">
            <h4>Sidebar</h4>

            <ul class="list-unstyled">
              <li>Home</li>
              <li>Events</li>
              <li>Contact</li>
              <li>Gallery</li>
            </ul>
          </div>
        </div>

        <div class="col-md-9">
          <div class="bg-white p-4 shadow rounded">
            <h4>Main Content</h4>

            <p>
              Welcome to the Local Community Event Portal. Browse upcoming
              events, workshops, and community activities happening near you.
            </p>
          </div>
        </div>
      </div>

      <!-- Exercise 4.2 -->

      <h3 class="mb-3">Four Column Layout</h3>

      <div class="row g-3">
        <div class="col-sm-3">
          <div class="bg-primary text-white text-center p-4 rounded">
            Column 1
          </div>
        </div>

        <div class="col-sm-3">
          <div class="bg-success text-white text-center p-4 rounded">
            Column 2
          </div>
        </div>

        <div class="col-sm-3">
          <div class="bg-warning text-dark text-center p-4 rounded">
            Column 3
          </div>
        </div>

        <div class="col-sm-3">
          <div class="bg-danger text-white text-center p-4 rounded">
            Column 4
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
