<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5 Setup</title>

    <!-- Bootstrap 5 CDN -->

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <div class="card shadow">
        <div class="card-body">
          <h1 class="text-primary">Local Community Event Portal</h1>

          <p class="lead">Bootstrap 5 successfully linked using CDN.</p>

          <button class="btn btn-success">Register Event</button>
        </div>
      </div>

      <div class="alert alert-info mt-4">
        Exercise 1.2: Bootstrap can also be installed using npm or downloaded
        Bootstrap files.
      </div>
    </div>

    <!-- Bootstrap JS Bundle -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
