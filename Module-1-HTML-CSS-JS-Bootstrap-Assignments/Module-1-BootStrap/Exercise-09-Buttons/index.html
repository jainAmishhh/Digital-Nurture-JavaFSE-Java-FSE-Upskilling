<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Bootstrap Buttons</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container py-5">
      <h1 class="text-center text-primary mb-5">Bootstrap Buttons</h1>

      <div class="card shadow">
        <div class="card-body">
          <h3 class="mb-4">Button Variants</h3>

          <button class="btn btn-primary m-1">Primary</button>

          <button class="btn btn-secondary m-1">Secondary</button>

          <button class="btn btn-success m-1">Success</button>

          <button class="btn btn-danger m-1">Danger</button>

          <button class="btn btn-warning m-1">Warning</button>

          <button class="btn btn-outline-primary m-1">Outline Primary</button>

          <hr />

          <h3 class="mb-4">Button Sizes</h3>

          <button class="btn btn-primary btn-lg m-1">Large Button</button>

          <button class="btn btn-success btn-sm m-1">Small Button</button>
        </div>
      </div>
    </div>
  </body>
</html>
