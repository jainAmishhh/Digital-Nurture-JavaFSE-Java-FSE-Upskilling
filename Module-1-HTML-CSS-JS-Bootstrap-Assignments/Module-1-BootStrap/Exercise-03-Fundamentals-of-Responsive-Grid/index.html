<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Responsive Grid Layout</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <h1 class="text-center text-primary mb-4">Community Events</h1>

      <div class="row g-4">
        <!-- Card 1 -->

        <div class="col-12 col-md-6 col-lg-4">
          <div class="card shadow h-100">
            <div class="card-body">
              <h3 class="card-title">Tech Meetup</h3>

              <p class="card-text">Learn modern web technologies.</p>
            </div>
          </div>
        </div>

        <!-- Card 2 -->

        <div class="col-12 col-md-6 col-lg-4">
          <div class="card shadow h-100">
            <div class="card-body">
              <h3 class="card-title">Music Festival</h3>

              <p class="card-text">Enjoy live music performances.</p>
            </div>
          </div>
        </div>

        <!-- Card 3 -->

        <div class="col-12 col-md-6 col-lg-4">
          <div class="card shadow h-100">
            <div class="card-body">
              <h3 class="card-title">Food Carnival</h3>

              <p class="card-text">Explore delicious local foods.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
