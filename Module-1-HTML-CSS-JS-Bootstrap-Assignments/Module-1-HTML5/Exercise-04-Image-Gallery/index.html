<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Community Event Gallery</title>

    <style>
      .event-image {
        width: 220px;
        height: 150px;
        border: 3px solid #333;
        border-radius: 8px;
        padding: 4px;
      }

      table {
        margin: auto;
        border-collapse: collapse;
      }

      td {
        padding: 15px;
        text-align: center;
      }

      h1 {
        text-align: center;
      }
    </style>
  </head>

  <body>
    <h1>Past Community Events Gallery</h1>

    <table>
      <tr>
        <td>
          <img
            src="images/event1.jpg"
            alt="Tech Meetup"
            title="Tech Meetup"
            class="event-image"
          />

          <p>Tech Meetup</p>
        </td>

        <td>
          <img
            src="images/event2.jpg"
            alt="Workshop"
            title="Web Development Workshop"
            class="event-image"
          />

          <p>Web Development Workshop</p>
        </td>

        <td>
          <img
            src="images/event3.jpg"
            alt="Hackathon"
            title="Community Hackathon"
            class="event-image"
          />

          <p>Community Hackathon</p>
        </td>
      </tr>

      <tr>
        <td>
          <img
            src="images/event4.jpg"
            alt="Cleanup Drive"
            title="Community Cleanup Drive"
            class="event-image"
          />

          <p>Community Cleanup Drive</p>
        </td>

        <td>
          <img
            src="images/event5.jpg"
            alt="Festival"
            title="Cultural Festival"
            class="event-image"
          />

          <p>Cultural Festival</p>
        </td>

        <td>
          <img
            src="images/event6.jpg"
            alt="Sports Event"
            title="Sports Event"
            class="event-image"
          />

          <p>Sports Event</p>
        </td>
      </tr>
    </table>
  </body>
</html>
