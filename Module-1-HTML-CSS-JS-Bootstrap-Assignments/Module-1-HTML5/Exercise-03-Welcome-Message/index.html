<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome Banner</title>

    <style>
      /* ID Selector */
      #welcomeBanner {
        background-color: blue;
        color: white;
        padding: 20px;
        text-align: center;
        border-radius: 8px;
      }

      /* Class Selector */
      .highlight {
        background-color: yellow;
        font-weight: bold;
        padding: 3px;
      }
    </style>
  </head>

  <body>
    <div id="welcomeBanner">
      <h1>Welcome Back, Amishhh!</h1>
      <p>We are glad to see you on the Local Community Event Portal.</p>
    </div>

    <br />

    <p>
      Register now and get

      <span style="color: red; font-weight: bold"> 20% OFF </span>

      on premium event passes.
    </p>

    <p class="highlight">Upcoming Tech Meetup this Saturday!</p>

    <p class="highlight">Limited seats available. Register soon.</p>
  </body>
</html>
