<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Selectors Playground</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- ID Selector -->
    <header id="mainHeader">
      <h1>Local Community Event Portal</h1>
    </header>

    <main>
      <!-- Element Selector -->
      <h2>Upcoming Events</h2>

      <!-- Class Selector -->
      <div class="eventCard">
        <h3>Tech Meetup</h3>

        <p>Join us for an exciting technology meetup.</p>
      </div>

      <div class="eventCard">
        <h3>Community Cleanup Drive</h3>

        <p>Help make our community cleaner and greener.</p>
      </div>

      <div class="eventCard">
        <h3>Web Development Workshop</h3>

        <p>Learn modern web development techniques.</p>
      </div>
    </main>
  </body>
</html>
