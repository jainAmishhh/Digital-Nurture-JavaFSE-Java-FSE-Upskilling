<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>CSS Inclusion Methods</title>

    <!-- Internal CSS -->
    <style>
      body {
        background-color: #f0f8ff;
      }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <!-- Inline CSS -->
      <h1 style="color: red">Local Community Event Portal</h1>

      <h2>Upcoming Community Events</h2>
    </header>

    <main>
      <p>This page demonstrates Inline, Internal, and External CSS.</p>

      <button>Register Now</button>
    </main>
  </body>
</html>
