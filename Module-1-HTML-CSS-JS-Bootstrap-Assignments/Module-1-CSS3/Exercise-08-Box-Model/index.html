<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Box Model and Layout Control</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1>Community Event Portal</h1>

    <!-- Event Card 1 -->
    <div class="eventCard">
      <h2>Tech Meetup</h2>

      <p>Join us for networking and technology discussions.</p>
    </div>

    <!-- Event Card 2 -->
    <div class="eventCard">
      <h2>Community Cleanup Drive</h2>

      <p>Help keep our city clean and green.</p>
    </div>

    <h2>Registration Form</h2>

    <form>
      <input type="text" placeholder="Enter your name" class="form-field" />

      <input type="email" placeholder="Enter your email" class="form-field" />
    </form>

    <h2>Visibility Comparison</h2>

    <div class="hidden-box">visibility: hidden</div>

    <div class="none-box">display: none</div>

    <div class="visible-box">Visible Box</div>
  </body>
</html>
