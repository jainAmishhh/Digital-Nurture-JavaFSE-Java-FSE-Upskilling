<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>jQuery Demo</title>

    <!-- jQuery CDN -->

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
      body {
        font-family: Arial, sans-serif;

        background-color: #f4f8ff;

        padding: 20px;

        text-align: center;
      }

      h1 {
        color: #1e3a8a;
      }

      .event-card {
        width: 400px;

        margin: 20px auto;

        padding: 20px;

        background: white;

        border-radius: 10px;

        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      }

      button {
        padding: 10px 15px;

        margin: 10px;

        cursor: pointer;
      }

      #frameworkBenefit {
        margin-top: 20px;

        color: green;

        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <h1>Community Event Portal</h1>

    <div class="event-card">
      <h2>Tech Meetup</h2>

      <p>Learn modern web technologies.</p>
    </div>

    <button id="registerBtn">Register</button>

    <button id="hideBtn">Fade Out Card</button>

    <button id="showBtn">Fade In Card</button>

    <p id="frameworkBenefit"></p>

    <script src="main.js"></script>
  </body>
</html>
