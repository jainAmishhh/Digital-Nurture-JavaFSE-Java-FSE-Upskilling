<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Community Event Portal</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f8ff;
        padding: 20px;
      }

      h1 {
        text-align: center;
        color: #1e3a8a;
      }

      .event-card {
        background: white;

        padding: 15px;

        margin: 15px 0;

        border-radius: 8px;

        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      }

      button {
        margin-right: 10px;

        padding: 8px 12px;

        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <h1>Local Community Event Portal</h1>

    <div id="eventContainer"></div>

    <script src="main.js"></script>
  </body>
</html>
