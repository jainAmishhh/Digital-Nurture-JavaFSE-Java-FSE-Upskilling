<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Event Handling</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background: #f4f8ff;
      }

      h1 {
        text-align: center;
        color: #1e3a8a;
      }

      .controls {
        margin: 20px 0;
        text-align: center;
      }

      select,
      input {
        padding: 8px;
        margin: 10px;
      }

      .event-card {
        background: white;
        padding: 15px;
        margin: 15px auto;
        width: 70%;
        border-radius: 8px;
        box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.15);
      }

      button {
        padding: 8px 12px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <h1>Local Community Event Portal</h1>

    <div class="controls">
      <select id="categoryFilter">
        <option value="All">All Categories</option>

        <option value="Technology">Technology</option>

        <option value="Music">Music</option>

        <option value="Social">Social</option>
      </select>

      <input type="text" id="searchBox" placeholder="Search Event" />
    </div>

    <div id="eventContainer"></div>

    <script src="main.js"></script>
  </body>
</html>
